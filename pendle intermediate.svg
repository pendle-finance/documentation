          transform="rotate(-43.5, 16.6, 36.7)">
      <animate attributeName="width"
               values="0;31;31;0"
               keyTimes="0;0.4;0.65;1"
               calcMode="spline"
               keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1"
               dur="5s" repeatCount="indefinite"/>
    </rect>
  </clipPath>
</defs>
<style>
  @keyframes spinCW {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes spinCCW {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-360deg); }
  }
  .spin-cw  { transform-origin: 26.9546px 27.2193px; animation: spinCW  5s linear infinite; }
  .spin-ccw { transform-origin: 26.9546px 27.2193px; animation: spinCCW 5s linear infinite; }
</style>

